name: Push MySQL to ACR

on:
  workflow_dispatch: # 允许你手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to ACR
        # 这里会去你刚才设置的“保险柜”里取用户名和密码
        run: docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} registry.cn-beijing.aliyuncs.com

      - name: Pull and Push
        run: |
          # 1. 从官方库下载 MySQL 9.0.1
          docker pull mysql:9.0.1
          
          # 2. 给它起个新名字（注意：要把“你的命名空间”换成你在阿里云 ACR 里创建的名字）
          docker tag mysql:9.0.1 registry.cn-beijing.aliyuncs.com/my-test-repo1/mysql:9.0.1
          
          # 3. 把改好名字的镜像推送到你的阿里云仓库
          docker push registry.cn-beijing.aliyuncs.com/my-test-repo1/mysql:9.0.1
